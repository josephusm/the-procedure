<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>The Procedure</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="crt-bezel">
    <div id="crt-screen">
      <div id="app">
        <header id="status-bar">
          <span id="system-id">PROCESSING SYSTEM v4.1.2</span>
          <span id="date-display"></span>
        </header>
        <main id="terminal"></main>
        <div id="bottom-panel">
          <div id="options-panel"></div>
          <div id="input-line">
            <span class="prompt">&gt;</span>
            <span class="input-text"></span>
            <span class="cursor">█</span>
          </div>
        </div>
      </div>
    </div>
    <div id="bezel-bottom">
      <div id="bezel-label">THE&nbsp;PROCEDURE&nbsp;&nbsp;·&nbsp;&nbsp;PROCESSING&nbsp;UNIT&nbsp;Ω</div>
      <button id="power-btn" aria-label="Power">
        <span class="power-icon">⏻</span>
      </button>
    </div>
  </div>
  <script type="module" src="src/engine.js"></script>
</body>
</html>
